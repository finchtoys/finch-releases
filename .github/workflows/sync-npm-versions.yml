name: Sync npm versions

on:
  schedule:
    - cron: '0 8 * * *'   # 每天 UTC 8:00（北京时间 16:00）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync npm versions
        run: python3 .finch/skills/community-manager/scripts/sync_npm_versions.py

      - name: Commit and push if changed
        run: |
          if [ -n "$(git status --porcelain community/extensions.json)" ]; then
            git add community/extensions.json
            git commit -m "chore: sync npm versions [skip ci]"
            git push
          else
            echo "No version changes, skipping commit"
          fi
