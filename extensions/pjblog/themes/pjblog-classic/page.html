<!DOCTYPE html>
<html lang="{{site.language}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{page.title}} · {{site.title}}</title>
<meta name="generator" content="{{generator}}">
<link rel="stylesheet" href="{{base}}style.css">
</head>
<body>
<div class="wrap">
<header class="banner">
  <h1 class="site-title"><a href="{{base}}index.html">{{site.title}}</a></h1>
  <p class="site-desc">{{site.description}}</p>
</header>
<nav class="topnav">
  <a href="{{base}}index.html">网站首页</a>
  <a href="{{base}}archive.html">日志归档</a>
  <a href="{{base}}about.html">关于本站</a>
  <a href="{{base}}rss.xml">订阅 RSS</a>
</nav>
<div class="columns">
  <main class="main-col">
    <article class="entry">
      <h2 class="entry-title">{{page.title}}</h2>
      <div class="entry-body post-content">{{{page.contentHtml}}}</div>
    </article>
  </main>
  <aside class="side-col">
    <section class="box">
      <h3>站点信息</h3>
      <ul><li>程序：{{generator}}</li></ul>
    </section>
  </aside>
</div>
<footer class="site-footer">
  <p>© {{site.year}} {{site.author}} · Powered by {{generator}}</p>
</footer>
</div>
</body>
</html>
