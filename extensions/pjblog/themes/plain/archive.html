<!DOCTYPE html>
<html lang="{{site.language}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{#pageTitle}}{{pageTitle}} · {{/pageTitle}}归档 · {{site.title}}</title>
<meta name="generator" content="{{generator}}">
<link rel="stylesheet" href="{{base}}style.css">
</head>
<body>
<header class="site-header">
  <h1 class="site-title"><a href="{{base}}index.html">{{site.title}}</a></h1>
  <nav class="site-nav">
    <a href="{{base}}index.html">首页</a>
    <a href="{{base}}archive.html">归档</a>
    <a href="{{base}}about.html">关于</a>
    <a href="{{base}}rss.xml">RSS</a>
  </nav>
</header>
<main>
  <h1 class="page-title">{{#pageTitle}}{{pageTitle}}{{/pageTitle}}{{^pageTitle}}归档{{/pageTitle}} <span class="count">{{totalCount}} 篇</span></h1>
  {{#groups}}
  <section class="archive-group">
    <h2 class="archive-year">{{year}}</h2>
    <ul class="archive-list">
      {{#posts}}
      <li><time>{{dateDisplay}}</time><a href="{{url}}">{{title}}</a>{{#draft}}<span class="draft-badge">草稿</span>{{/draft}}</li>
      {{/posts}}
    </ul>
  </section>
  {{/groups}}
</main>
<footer class="site-footer">
  <p>© {{site.year}} {{site.author}} · Powered by {{generator}}</p>
</footer>
</body>
</html>
