<!DOCTYPE html>
<html lang="{{site.language}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{page.title}} · {{site.title}}</title>
<meta name="generator" content="{{generator}}">
<link rel="stylesheet" href="{{base}}style.css">
</head>
<body>
<header class="site-header">
  <h1 class="site-title"><a href="{{base}}index.html">{{site.title}}</a></h1>
  <nav class="site-nav">
    <a href="{{base}}index.html">首页</a>
    <a href="{{base}}archive.html">归档</a>
    <a href="{{base}}about.html">关于</a>
    <a href="{{base}}rss.xml">RSS</a>
  </nav>
</header>
<main>
  <article class="post">
    <h1 class="post-title">{{page.title}}</h1>
    <div class="post-content">{{{page.contentHtml}}}</div>
  </article>
</main>
<footer class="site-footer">
  <p>© {{site.year}} {{site.author}} · Powered by {{generator}}</p>
</footer>
</body>
</html>
